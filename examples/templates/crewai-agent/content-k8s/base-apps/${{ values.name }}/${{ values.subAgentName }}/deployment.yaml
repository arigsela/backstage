# ==============================================================================
# Sub-Agent Deployment, ServiceAccount, and Service
# ==============================================================================
# The sub-agent (${{ values.subAgentDisplayName }}) is an independent AI agent
# that handles domain-specific queries. It receives tasks from the orchestrator
# via the A2A (Agent-to-Agent) protocol and returns structured results.
#
# Architecture:
#   Orchestrator --A2A--> Service (port ${{ values.subAgentPort }}) -> Deployment
#
# The sub-agent is NOT exposed to the internet — only reachable within
# the cluster via its ClusterIP Service.
# ==============================================================================

# ------------------------------------------------------------------------------
# Deployment
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}-${{ values.subAgentName }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.name }}-${{ values.subAgentName }}
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.name }}-${{ values.subAgentName }}
  template:
    metadata:
      labels:
        app: ${{ values.name }}-${{ values.subAgentName }}
        version: v1
    spec:
      # Dedicated ServiceAccount for this sub-agent
      serviceAccountName: ${{ values.name }}-${{ values.subAgentName }}
      # Disable automatic SA token mount — this pod doesn't need K8s API access
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ecr-registry
      nodeSelector:
        node.kubernetes.io/workload: application
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000

      containers:
        - name: agent
          # ECR image — built by deploy-to-ecr.sh, pinned to scaffolded version
          image: 852893458518.dkr.ecr.us-east-2.amazonaws.com/${{ values.name }}-${{ values.subAgentName }}:${{ values.version }}
          imagePullPolicy: Always

          # Container-level security hardening
          securityContext:
            allowPrivilegeEscalation: false

          ports:
            - name: http
              containerPort: ${{ values.subAgentPort }}
              protocol: TCP

          # Non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: ${{ values.subAgentName }}-config

          # Sensitive values from Vault via ExternalSecrets
          env:
            - name: HOME
              value: /tmp
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ${{ values.subAgentName }}-secrets
                  key: anthropic-api-key
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: ${{ values.subAgentName }}-secrets
                  key: api-keys

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: ${{ values.subAgentPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: ${{ values.subAgentPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      terminationGracePeriodSeconds: 30

---
# ------------------------------------------------------------------------------
# ServiceAccount
# ------------------------------------------------------------------------------
# The sub-agent doesn't need K8s API access. The SA exists for:
# 1. Vault authentication (SecretStore references it)
# 2. Security isolation (pods shouldn't share the default SA)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ values.name }}-${{ values.subAgentName }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.name }}-${{ values.subAgentName }}
    component: rbac
automountServiceAccountToken: false

---
# ------------------------------------------------------------------------------
# Service
# ------------------------------------------------------------------------------
# ClusterIP Service for internal A2A communication.
# The orchestrator connects to this service using the DNS name:
#   http://${{ values.name }}-${{ values.subAgentName }}.${{ values.namespace }}.svc:${{ values.subAgentPort }}
apiVersion: v1
kind: Service
metadata:
  name: ${{ values.name }}-${{ values.subAgentName }}
  namespace: ${{ values.namespace }}
  labels:
    app: ${{ values.name }}-${{ values.subAgentName }}
spec:
  type: ClusterIP
  selector:
    app: ${{ values.name }}-${{ values.subAgentName }}
  ports:
    - name: http
      # Sub-agent service listens on the configured port directly
      # (unlike the orchestrator which maps 80 -> containerPort)
      port: ${{ values.subAgentPort }}
      targetPort: ${{ values.subAgentPort }}
      protocol: TCP
