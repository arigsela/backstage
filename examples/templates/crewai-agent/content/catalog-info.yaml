# ==============================================================================
# Backstage Catalog Entity Definition
# ==============================================================================
# This file registers the agent project in the Backstage software catalog.
# When a repo contains this file AND GitHub auto-discovery is enabled,
# Backstage automatically imports the entity every 30 minutes.
#
# KEY ANNOTATIONS:
# - backstage.io/kubernetes-id: Maps this entity to K8s resources (pods, deployments)
#   that have a matching label. The Backstage K8s plugin uses this to show live
#   pod status on the entity's "Kubernetes" tab.
# - github.com/project-slug: Links to the GitHub repo for SCM integration.
# - backstage.io/techdocs-ref: Enables TechDocs rendering if mkdocs.yml exists.
# ==============================================================================

apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.name }}
  description: ${{ values.description }}
  annotations:
    # Links to the GitHub repo — enables "View Source" and PR integration
    github.com/project-slug: arigsela/${{ values.name }}
    # Maps to K8s resources with label backstage.io/kubernetes-id=${{ values.name }}
    backstage.io/kubernetes-id: ${{ values.name }}
  tags:
    - crewai
    - ai-agent
    - python
spec:
  type: service
  lifecycle: experimental
  owner: ${{ values.owner }}
