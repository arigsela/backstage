# examples/templates/application/template.yaml
# Application (Crossplane) — onboard an existing container image as a managed
# app via Crossplane Composition. Single-repo: only opens a PR to
# arigsela/kubernetes; does not create a source-code repo.
# Companion design doc: arigsela/kubernetes:docs/superpowers/specs/2026-04-28-backstage-crossplane-idp-design.md
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: application-template
  title: Application (Crossplane)
  description: >-
    Onboard an existing container image as a managed application. Provisions
    Deployment + Service + Ingress and an optional CloudNativePG database
    via a Crossplane v2 Composition.
  tags:
    - crossplane
    - kubernetes
    - recommended
spec:
  owner: group:platform-engineering
  type: service

  parameters:
    - title: Identity
      required: [name, owner]
      properties:
        name:
          type: string
          title: Application name
          description: Lowercase, hyphenated. Used as namespace and resource prefix.
          pattern: "^[a-z][a-z0-9-]{2,38}[a-z0-9]$"
        owner:
          type: string
          title: Owner
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: [Group, User]

    - title: Workload
      required: [image, host, port]
      properties:
        image:
          type: string
          title: Container image (full ref including tag)
          description: e.g. 852893458518.dkr.ecr.us-east-2.amazonaws.com/my-app:1.0.0
        host:
          type: string
          title: Public hostname
          description: e.g. my-app.arigsela.com (DNS must already point at the cluster)
        port:
          type: integer
          title: Container port
          default: 8080
        replicas:
          type: integer
          title: Replicas
          default: 2
          minimum: 1
          maximum: 10
        healthCheckPath:
          type: string
          title: Health check path (optional)
          description: HTTP path for liveness/readiness probes. Defaults to '/' which works for most images (nginx, generic web servers).
          default: "/"
          pattern: "^/.*"

    - title: Resources (optional)
      properties:
        dbNeeded:
          type: boolean
          title: Provision a Postgres database (CloudNativePG)
          default: false
        dbStorage:
          type: string
          title: Database storage size
          default: "1Gi"
        s3Needed:
          type: boolean
          title: Provision an AWS S3 bucket (with dedicated IAM user)
          description: |
            When enabled, the platform creates an S3 bucket + IAM user + access
            key for this app. Workload receives AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
            AWS_REGION, BUCKET_NAME env vars automatically (zero code changes — AWS SDK
            auto-detects).
            WARNING: bucket contents are deleted when the app is torn down (forceDestroy).
          default: false
        s3Versioning:
          type: boolean
          title: Enable bucket versioning
          description: |
            When enabled, the bucket retains all versions of objects.
            Useful for recovery from accidental deletes/overwrites.
          default: false
        s3LifecycleDays:
          type: integer
          title: Bucket lifecycle (days until objects expire)
          description: |
            When > 0, S3 automatically deletes objects older than N days.
            Common values: 7 (logs), 30 (build artifacts), 365 (compliance).
            Set to 0 to disable lifecycle.
          default: 0
          minimum: 0
        s3CorsEnabled:
          type: boolean
          title: Enable CORS (web app pattern)
          description: |
            When enabled, the bucket allows cross-origin browser access
            with permissive defaults (all origins, common methods).
            Useful for web apps loading assets directly from S3.
          default: false

  steps:
    - id: fetch
      name: Render manifests
      action: fetch:template
      input:
        url: ./content-k8s
        values:
          name: ${{ parameters.name | trim }}
          namespace: ${{ parameters.name | trim }}
          owner: ${{ parameters.owner | trim }}
          image: ${{ parameters.image | trim }}
          host: ${{ parameters.host | trim }}
          healthCheckPath: ${{ parameters.healthCheckPath | trim }}
          port: ${{ parameters.port }}
          replicas: ${{ parameters.replicas }}
          dbNeeded: ${{ parameters.dbNeeded }}
          dbStorage: ${{ parameters.dbStorage | trim }}
          s3Needed: ${{ parameters.s3Needed }}
          s3Versioning: ${{ parameters.s3Versioning }}
          s3LifecycleDays: ${{ parameters.s3LifecycleDays }}
          s3CorsEnabled: ${{ parameters.s3CorsEnabled }}
          bucketName: 852893458518-${{ parameters.name | trim }}

    - id: publish
      name: Open PR to arigsela/kubernetes
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=kubernetes&owner=arigsela
        branchName: scaffold/${{ parameters.name }}
        title: "feat(${{ parameters.name }}): onboard via Crossplane Application"
        description: |
          Generated by Backstage `application-template`.
          Owner: ${{ parameters.owner }}
          Database: ${{ parameters.dbNeeded }}
        targetPath: ""

  # NOTE: no catalog:register step here. The XApplication is rendered with
  # terasky.backstage.io/* annotations (see content-k8s/.../application-xr.yaml).
  # TeraSky's kubernetes-ingestor auto-ingests XRs as Backstage catalog entities
  # within ~30-120s of the XR being applied — no manual /catalog-import step
  # and no scaffolder catalog:register call needed.

  output:
    links:
      - title: Pull request
        url: ${{ steps.publish.output.remoteUrl }}
