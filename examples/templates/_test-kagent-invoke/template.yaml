# THROWAWAY — Layer 2 validation only.
# Delete this directory after recording the result.
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: _test-kagent-invoke
  title: '[INTERNAL] Test kagent:agent:invoke'
  description: >-
    Throwaway template for Layer 2 validation of the kagent:agent:invoke
    scaffolder action. Sends a prompt to a kagent agent and shows the
    response (or error) in the output panel. Delete after validation.
  tags:
    - internal
    - test
spec:
  owner: group:platform-engineering
  type: service

  parameters:
    - title: Test invocation
      required: [agentName, prompt]
      properties:
        agentName:
          title: Agent name
          type: string
          default: dnd-agent
          description: An agent that exists in the catalog with the agents.platform.ai/* v1 contract.
        prompt:
          title: Prompt
          type: string
          default: Say hello in one short sentence.
          ui:widget: textarea
          ui:options:
            rows: 4
        timeoutMs:
          title: Timeout (ms)
          type: integer
          default: 60000
          minimum: 5000
          maximum: 300000
        expectJson:
          title: Parse response as JSON
          type: boolean
          default: false

  steps:
    - id: call-agent
      name: Call the kagent agent
      action: kagent:agent:invoke
      input:
        name: ${{ parameters.agentName }}
        prompt: ${{ parameters.prompt }}
        timeoutMs: ${{ parameters.timeoutMs }}
        expectJson: ${{ parameters.expectJson }}
        onError: continue

  output:
    text:
      - title: Invocation result
        content: |
          **Agent**: `${{ steps['call-agent'].output.agentName }}`
          **Runtime**: `${{ steps['call-agent'].output.runtime }}`
          **Duration**: `${{ steps['call-agent'].output.durationMs }}ms`

          **Error** (null on success):
          ```
          ${{ steps['call-agent'].output.error | dump }}
          ```

          **Response**:
          ```
          ${{ steps['call-agent'].output.response }}
          ```
